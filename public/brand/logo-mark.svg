<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none" role="img" aria-label="IntelliForge mark">
  <defs>
    <linearGradient id="if-border" x1="0" y1="0" x2="64" y2="64" gradientUnits="userSpaceOnUse">
      <stop stop-color="#4f46e5"/>
      <stop offset="0.5" stop-color="#7c3aed"/>
      <stop offset="1" stop-color="#06b6d4"/>
    </linearGradient>
    <linearGradient id="if-glow" x1="0" y1="0" x2="0" y2="64" gradientUnits="userSpaceOnUse">
      <stop stop-color="#4f46e5" stop-opacity="0.25"/>
      <stop offset="1" stop-color="#4f46e5" stop-opacity="0"/>
    </linearGradient>
  </defs>
  <!-- Harness layer accent bars -->
  <rect x="4" y="14" width="3" height="36" rx="1.5" fill="#10b981" opacity="0.9"/>
  <rect x="4" y="18" width="3" height="28" rx="1.5" fill="#4f46e5" opacity="0.85"/>
  <rect x="4" y="22" width="3" height="20" rx="1.5" fill="#7c3aed" opacity="0.85"/>
  <rect x="4" y="26" width="3" height="12" rx="1.5" fill="#06b6d4" opacity="0.85"/>
  <rect x="4" y="30" width="3" height="4" rx="1.5" fill="#f97316" opacity="0.9"/>
  <!-- Mark container -->
  <rect x="10" y="8" width="50" height="48" rx="12" fill="#0f172a" stroke="url(#if-border)" stroke-width="2"/>
  <rect x="10" y="8" width="50" height="48" rx="12" fill="url(#if-glow)"/>
  <text x="35" y="42" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="22" font-weight="900" fill="#e2e8f0" letter-spacing="-1">IF</text>
</svg>
